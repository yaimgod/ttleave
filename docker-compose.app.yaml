# ══════════════════════════════════════════════════════════════════════════════
# TTLeave — App-only Docker Compose
# ══════════════════════════════════════════════════════════════════════════════
#
# Starts: app (Next.js), nlp (BERT sidecar)
# Requires: a running Supabase instance (separate Coolify resource or local stack)
#
# COOLIFY:
#   Deploy this file as its own Coolify resource (Docker Compose type).
#   Set env vars in Coolify's Environment Variables panel — see .env.app.example.
#   Join this resource to the Supabase resource's Docker network so that
#   http://kong:8000 resolves from inside the app container.
#
# LOCAL (app-only against local Supabase stack):
#   docker compose -f docker-compose.app.yaml up -d
#   Requires docker-compose.supabase.yaml to already be running.
#   Attach to the same network:
#     docker network connect ttleave_supabase_net ttleave-app-1
#
# LOCAL FULL STACK (everything together):
#   Use docker-compose.yaml with --profile supabase instead.
# ══════════════════════════════════════════════════════════════════════════════

networks:
  # External network shared with the Supabase stack so http://kong:8000 resolves.
  # When running via Coolify, connect both resources to the same network in the
  # Coolify UI (Settings → Network).
  supabase_net:
    external: true
    name: ${SUPABASE_NETWORK_NAME:-ttleave_supabase_net}

services:

  # ── NLP SIDECAR (Python FastAPI + BERT sentiment) ────────────────────────────
  # Model weights baked into the image at build time — no volume needed.
  # Internal only: not exposed to the host, reachable at http://nlp:8080.
  nlp:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    image: yaimgod/ttleave-nlp:latest
    restart: unless-stopped
    networks:
      - supabase_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── NEXT.JS APP ───────────────────────────────────────────────────────────────
  # NEXT_PUBLIC_* vars are baked into the client bundle at build time (ARG).
  # SUPABASE_URL is the internal Docker URL to Kong (server-side SSR/API only).
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    image: yaimgod/ttleave-app:latest
    ports:
      - "3000:3000"
    networks:
      - supabase_net
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      # Server-side Kong URL — works when both stacks share supabase_net.
      # Override with SUPABASE_URL env var if Kong is on a different network.
      SUPABASE_URL: ${SUPABASE_URL:-http://kong:8000}
      NLP_SERVICE_URL: http://nlp:8080
    depends_on:
      nlp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

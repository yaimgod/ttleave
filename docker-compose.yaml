# ══════════════════════════════════════════════════════════════════════════════
# TTLeave — App stack  (Next.js + NLP sidecar)
#
# Joins the shared Docker network "ttleave_shared" created by
# docker-compose.supabase.yaml so the app can reach Kong by hostname
# (SUPABASE_URL=http://kong:8000) without exposing Kong to the internet.
#
# COOLIFY — deploy as a separate "Docker Compose" resource.
#   Compose file: docker-compose.yaml  (this file)
#   Env file:     paste contents of .env.app into Coolify's env panel.
#   Network:      Coolify resource settings → "Networks" tab →
#                 connect to the Supabase resource's network so that
#                 http://kong:8000 resolves from inside the app container.
#
# LOCAL DEV — start Supabase first, then this:
#   docker compose -f docker-compose.supabase.yaml up -d   # creates ttleave_shared
#   docker compose up -d --build
#
# BUILD ARGS — NEXT_PUBLIC_* vars must be known at build time (baked into
# the client bundle by Next.js). Pass them via Coolify's build-args panel
# or as shell env vars for local builds.
# ══════════════════════════════════════════════════════════════════════════════

networks:
  supabase_net:
    # Joins the network created by docker-compose.supabase.yaml.
    # Locally: supabase stack must be up first (it creates ttleave_shared).
    # Coolify: use the "Connect Network" UI to attach to the Supabase resource.
    external: true
    name: ttleave_shared
  coolify:
    # Coolify's Traefik proxy network — pre-existing, never created/deleted here.
    # The app must be on this network so Traefik can route traffic to it.
    external: true

services:

  # ── NLP SIDECAR (Python FastAPI + BERT sentiment) ────────────────────────────
  # Model weights baked into the image at build time — no volume needed.
  nlp:
    image: ghcr.io/yaimgod/ttleave-nlp:latest
    restart: unless-stopped
    networks:
      - supabase_net
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s   # model deserialisation takes ~20-30s on first start

  # ── NEXT.JS APP ───────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/yaimgod/ttleave-app:latest
    ports:
      - "3000:3000"
    networks:
      - supabase_net
      - coolify
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      # Internal Docker hostname — works when both stacks share ttleave_shared.
      # If deploying without network sharing, override with the public Kong URL.
      SUPABASE_URL: http://kong:8000
      NLP_SERVICE_URL: http://nlp:8080
    depends_on:
      nlp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD", "wget", "--quiet", "--tries=1", "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

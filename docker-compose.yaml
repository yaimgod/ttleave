# ══════════════════════════════════════════════════════════════════════════════
# TTLeave — Fully Self-Hosted Stack
#
# Includes Supabase (PostgreSQL, GoTrue Auth, PostgREST, Realtime, Storage,
# Imgproxy, pg-meta, Kong API Gateway, Studio) + Next.js app.
#
# BEFORE FIRST RUN:
#   1. cp .env.example .env
#   2. bash scripts/generate-secrets.sh  → paste output into .env
#   3. Fill in SMTP_* and URL vars in .env
#   4. If db previously failed to start (e.g. "schema auth does not exist"), run:
#      docker compose down -v   # removes volumes so db can re-initialize
#   5. docker compose up -d
#   Role passwords are set by the db container on startup (scripts/db-setpass.sh).
#
# COOLIFY DEPLOYMENT:
#   - Use "Docker Compose" deployment type in Coolify
#   - Set all env vars in Coolify's Environment Variables panel
#   - Kong (port 8001 by default) and the app (port 3000) are the two entry points
#   - Use Coolify's reverse proxy / Let's Encrypt for TLS in front of port 3000
# ══════════════════════════════════════════════════════════════════════════════

networks:
  supabase_net:
    driver: bridge

volumes:
  db-data:
  storage-data:
  db-config:
  nlp-model-cache:

services:

  # ── POSTGRESQL ──────────────────────────────────────────────────────────────
  # supabase/postgres ships with the auth schema, roles (anon, authenticator,
  # supabase_admin, etc.) and extensions. We let it use its own entrypoint.
  # POSTGRES_PASSWORD sets the superuser password; the image also sets it on
  # the reserved Supabase roles via its own init scripts.
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    networks:
      - supabase_net
    volumes:
      - db-data:/var/lib/postgresql/data
      - db-config:/etc/postgresql-custom
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  # ── MIGRATIONS ───────────────────────────────────────────────────────────────
  # One-shot service that runs after db is healthy:
  #   1. Sets POSTGRES_PASSWORD on the Supabase reserved roles so downstream
  #      services (auth, rest, storage, realtime) can authenticate via TCP.
  #      Must connect as supabase_admin (the actual superuser in supabase/postgres).
  #   2. Applies the four app SQL migration files (idempotent).
  migrate:
    image: supabase/postgres:15.8.1.085
    restart: "no"
    networks:
      - supabase_net
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations:/migrations:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for db..."
        until pg_isready -h db -U supabase_admin -d postgres 2>/dev/null; do sleep 2; done
        echo "DB ready."

        # supabase/postgres sets POSTGRES_PASSWORD on the supabase_admin role.
        # Connect as supabase_admin (the true superuser) to set passwords on
        # the other reserved roles so PostgREST, GoTrue and Storage can connect.
        ESCAPED=$(printf '%s' "$$POSTGRES_PASSWORD" | sed "s/'/''/g")
        psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" <<SQL
          ALTER ROLE supabase_auth_admin    WITH PASSWORD '$$ESCAPED';
          ALTER ROLE supabase_storage_admin WITH PASSWORD '$$ESCAPED';
          ALTER ROLE authenticator          WITH PASSWORD '$$ESCAPED';
        SQL
        echo "Role passwords set."

        # Apply base schema migrations (skip if profiles table already exists).
        if psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -tAc \
          "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='profiles'" \
          | grep -q 1; then
          echo "Base schema already applied, skipping 001-004."
        else
          echo "Applying base migrations..."
          for f in \
            /migrations/001_initial_schema.sql \
            /migrations/002_rls_policies.sql \
            /migrations/003_functions_triggers.sql \
            /migrations/004_realtime_publication.sql; do
            echo "  -> $$f"
            psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -f "$$f"
          done
          echo "Base migrations applied."

          # Create _realtime schema so the Realtime service can run its own migrations.
          psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -c \
            "CREATE SCHEMA IF NOT EXISTS _realtime; GRANT ALL ON SCHEMA _realtime TO supabase_admin;"
          echo "_realtime schema ready."
        fi

        # Always run incremental migrations (idempotent via IF NOT EXISTS / IF EXISTS).
        # These run on EVERY container start to apply new columns/changes to existing DBs.
        echo "Applying incremental migrations..."
        psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" \
          -f "/migrations/005_nlp_linear_regression.sql"
        echo "All done."
    depends_on:
      db:
        condition: service_healthy

  # ── KONG API GATEWAY ────────────────────────────────────────────────────────
  # All Supabase client requests (REST, Auth, Realtime, Storage) flow through Kong.
  # Kong uses declarative (DB-less) config from supabase/kong.yml.
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    networks:
      - supabase_net
    ports:
      - "${KONG_HTTP_PORT:-8001}:8000"
    volumes:
      - ./supabase/kong.yml:/home/kong/kong.yml.tpl:ro
      - ./supabase/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    # kong-entrypoint.sh uses perl to substitute ${VAR} placeholders in kong.yml.tpl
    # before Kong loads the config. Kong 2.x does NOT auto-expand env vars.
    entrypoint: ["/bin/bash", "/home/kong/kong-entrypoint.sh"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── GOTRUE (AUTH) ───────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-TTLeave}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_AUTH:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback

    depends_on:
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── MAILPIT (SMTP + Web UI for outbound email) ──────────────────────────────
  # Catches all outgoing email from GoTrue and provides a web UI at port 8025.
  # SMTP relay: mailpit:1025 (no auth, no TLS — internal only).
  # On production: replace SMTP_HOST/PORT/USER/PASS in .env with your real provider
  # and remove or comment out this service.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    networks:
      - supabase_net
    ports:
      - "127.0.0.1:8025:8025"   # Web UI — browse caught emails
      - "127.0.0.1:1025:1025"   # SMTP intake (internal; not exposed publicly)
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── POSTGREST (REST API) ────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v14.5
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_EXTRA_SEARCH_PATH: ${PGRST_DB_EXTRA_SEARCH_PATH:-public,extensions}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: postgrest
    healthcheck:
      # PostgREST image has no wget/curl — use bash built-in TCP check
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── REALTIME ────────────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Health endpoint requires JWT; use a simple TCP port check instead
      test: ["CMD", "sh", "-c", "curl -sf http://127.0.0.1:4000/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── STORAGE ─────────────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.37.8
    restart: unless-stopped
    networks:
      - supabase_net
    volumes:
      - storage-data:/var/lib/storage
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      imgproxy:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5000/status",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── IMGPROXY ─────────────────────────────────────────────────────────────────
  imgproxy:
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── PG-META (database management API) ───────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: ${POSTGRES_PORT:-5432}
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ── STUDIO (Supabase Dashboard UI) ───────────────────────────────────────────
  # Bound to localhost only: access via SSH tunnel (e.g. ssh -L 3001:127.0.0.1:3001 user@vps)
  # or via Kong at path / with basic-auth (DASHBOARD_USERNAME/PASSWORD). Not exposed on 0.0.0.0.
  studio:
    image: supabase/studio:2026.02.16-sha-26c615c
    restart: unless-stopped
    networks:
      - supabase_net
    ports:
      - "127.0.0.1:3001:3000"
    # Studio (Next.js) binds to its eth0 IP, not loopback. Use os.hostname() so
    # the healthcheck resolves to the correct interface regardless of container IP.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://'+require('os').hostname()+':3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-TTLeave}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-TTLeave}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_PUBLIC_ACCESS_TOKEN:-stub}
      LOGFLARE_URL: http://localhost:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    depends_on:
      kong:
        condition: service_healthy
      meta:
        condition: service_started

  # ── NLP SIDECAR (Python FastAPI + XLM-RoBERTa) ──────────────────────────────
  # Multilingual sentiment model: cardiffnlp/twitter-xlm-roberta-base-sentiment
  # Exposes POST /score → { score: 0-1 float, label: string }
  # Model weights are baked into the image layer AND persisted in nlp-model-cache
  # so they survive container restarts without re-downloading.
  nlp:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - supabase_net
    volumes:
      - nlp-model-cache:/app/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s  # model deserialization takes ~20-30s on first start

  # ── NEXT.JS APP ───────────────────────────────────────────────────────────────
  # NEXT_PUBLIC_SUPABASE_URL must be the URL the USER'S BROWSER sends requests to.
  # This is the externally reachable Kong URL (e.g. https://api.yourdomain.com or
  # http://your-vps-ip:8001). It is baked into the client JS bundle at build time.
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    networks:
      - supabase_net
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      # Server-side URL — used by Next.js SSR/middleware to reach Kong inside Docker.
      # NEXT_PUBLIC_SUPABASE_URL is the browser-facing URL (localhost or your domain)
      # and is unreachable from inside the container. This internal URL is used instead.
      SUPABASE_URL: http://kong:8000
      # Internal URL for the Python NLP sidecar (only reachable from within Docker network)
      NLP_SERVICE_URL: http://nlp:8080
    depends_on:
      kong:
        condition: service_healthy
      nlp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

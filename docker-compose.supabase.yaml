# ══════════════════════════════════════════════════════════════════════════════
# TTLeave — Supabase stack
#
# Deploys the full self-hosted Supabase infrastructure:
#   db · migrate · kong · auth · rest · realtime · storage · imgproxy · meta · studio
#
# Uses the external shared network "ttleave_shared" to communicate with the App
# stack. Create it once on the host: docker network create --attachable ttleave_shared
#
# COOLIFY — deploy as a separate "Docker Compose" resource.
#   Compose file: docker-compose.supabase.yaml
#   Env file: paste contents of .env.supabase into Coolify's env panel.
#
# LOCAL DEV — create the shared network once, then run both stacks:
#   docker network create --attachable ttleave_shared
#   docker compose -f docker-compose.supabase.yaml up -d
#   docker compose up -d --build
#
# FIRST RUN:
#   1. cp .env.supabase.example .env.supabase
#   2. bash scripts/generate-secrets.sh → paste output into .env.supabase
#   3. Fill in SMTP_* and URL vars
#   4. docker network create --attachable ttleave_shared
#   5. docker compose -f docker-compose.supabase.yaml up -d
#
# RESET (wipe DB and start fresh):
#   docker compose -f docker-compose.supabase.yaml down -v
# ══════════════════════════════════════════════════════════════════════════════

networks:
  supabase_net:
    # Pre-created external network shared with the App stack.
    # Create once on the VPS: docker network create --attachable ttleave_shared
    # Neither stack owns it so redeploys never try to remove it.
    external: true
    name: ttleave_shared
  coolify:
    # Coolify's Traefik proxy network — pre-existing, never created/deleted here.
    external: true

volumes:
  db-data:
  storage-data:
  db-config:

services:

  # ── POSTGRESQL ──────────────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    networks:
      - supabase_net
    volumes:
      - db-data:/var/lib/postgresql/data
      - db-config:/etc/postgresql-custom
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  # ── MIGRATIONS ───────────────────────────────────────────────────────────────
  # One-shot container: sets role passwords then applies all SQL migrations.
  # Runs on every deploy — all migrations are idempotent.
  migrate:
    image: supabase/postgres:15.8.1.085
    restart: "no"
    networks:
      - supabase_net
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations:/migrations:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "Waiting for db..."
        until pg_isready -h db -U supabase_admin -d postgres 2>/dev/null; do sleep 2; done
        echo "DB ready."

        ESCAPED=$(printf '%s' "$$POSTGRES_PASSWORD" | sed "s/'/''/g")
        psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" <<SQL
          ALTER ROLE supabase_auth_admin    WITH PASSWORD '$$ESCAPED';
          ALTER ROLE supabase_storage_admin WITH PASSWORD '$$ESCAPED';
          ALTER ROLE authenticator          WITH PASSWORD '$$ESCAPED';
        SQL
        echo "Role passwords set."

        if psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -tAc \
          "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='profiles'" \
          | grep -q 1; then
          echo "Base schema already applied, skipping 001-004."
        else
          echo "Applying base migrations..."
          for f in \
            /migrations/001_initial_schema.sql \
            /migrations/002_rls_policies.sql \
            /migrations/003_functions_triggers.sql \
            /migrations/004_realtime_publication.sql; do
            echo "  -> $$f"
            psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -f "$$f"
          done
          echo "Base migrations applied."

          psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -c \
            "CREATE SCHEMA IF NOT EXISTS _realtime; GRANT ALL ON SCHEMA _realtime TO supabase_admin;"
          echo "_realtime schema ready."
        fi

        echo "Applying incremental migrations (idempotent)..."
        for f in \
          /migrations/005_nlp_linear_regression.sql \
          /migrations/006_fix_nlp_feedback_duplicates.sql \
          /migrations/007_reset_nlp_model_to_new_defaults.sql; do
          echo "  -> $$f"
          psql "postgresql://supabase_admin:$$POSTGRES_PASSWORD@db:5432/postgres" -f "$$f"
        done
        echo "All migrations done."
    depends_on:
      db:
        condition: service_healthy

  # ── KONG API GATEWAY ─────────────────────────────────────────────────────────
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    networks:
      - supabase_net
      - coolify   # must be on coolify network so Traefik can proxy api.yourdomain.com → kong:8000
    ports:
      - "${KONG_HTTP_PORT:-8001}:8000"
    volumes:
      - ./supabase/kong.yml:/home/kong/kong.yml.tpl:ro
      - ./supabase/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/home/kong/kong-entrypoint.sh"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── GOTRUE (AUTH) ─────────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-TTLeave}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_AUTH:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── POSTGREST (REST API) ──────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v14.5
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
      PGRST_DB_EXTRA_SEARCH_PATH: ${PGRST_DB_EXTRA_SEARCH_PATH:-public,extensions}
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: postgrest
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── REALTIME ──────────────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://127.0.0.1:4000/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── STORAGE ───────────────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.37.8
    restart: unless-stopped
    networks:
      - supabase_net
    volumes:
      - storage-data:/var/lib/storage
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      imgproxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── IMGPROXY ──────────────────────────────────────────────────────────────────
  imgproxy:
    image: darthsim/imgproxy:v3.30.1
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── PG-META ───────────────────────────────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    networks:
      - supabase_net
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: ${POSTGRES_PORT:-5432}
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ── STUDIO (Supabase Dashboard UI) ────────────────────────────────────────────
  # Bound to localhost only — access via SSH tunnel.
  # Do NOT expose port 3001 through Coolify's proxy.
  studio:
    image: supabase/studio:2026.02.16-sha-26c615c
    restart: unless-stopped
    networks:
      - supabase_net
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://'+require('os').hostname()+':3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-TTLeave}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-TTLeave}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: stub
      LOGFLARE_URL: http://localhost:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    depends_on:
      kong:
        condition: service_healthy
      meta:
        condition: service_started

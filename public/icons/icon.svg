<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#6366f1"/>
  <!-- Outer circle (countdown ring) -->
  <circle cx="256" cy="256" r="160" stroke="white" stroke-width="20" stroke-opacity="0.3" fill="none"/>
  <!-- Inner tick arc (top 3/4) -->
  <path
    d="M 256 96
       A 160 160 0 1 1 135.76 375.76"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Clock hands -->
  <line x1="256" y1="256" x2="256" y2="148" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="316" y2="296" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="white"/>
</svg>
